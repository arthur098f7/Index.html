<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dengue Zero - Registro de Focos</title>
    <meta name="description" content="App para registro de focos de dengue">
    <meta name="theme-color" content="#28a745">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA -->
    <link rel="manifest" href="data:application/manifest+json,{"name":"Dengue Zero","short_name":"DengueZero","start_url":".","display":"standalone","background_color":"#28a745","theme_color":"#28a745","icons":[{"src":"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxjaXJjbGUgY3g9Ijk2IiBjeT0iOTYiIHI9Ijk2IiBmaWxsPSIjMjhhNzQ1Ii8+CjxwYXRoIGQ9Ik0xMjAgMTI1QzEyMCAxMzEuMjMgMTE0LjIzIDEzNSAxMDggMTM1SDg0Qzc3Ljc3IDEzNSA3NiAxMzEuMjMgNzYgMTI1VjEwNUgxMjBWMTI1Wk0xMDQgNzBDMTA0IDY5LjI1IDEwMi4yNSA2NyAxMDAgNjdINFYxNjBDNCAxNjYuMjUgNS43NyAxNzEgMTIgMTcxSDE4MEMxODYuMjMgMTcxIDE4OCAxNjYuMjMgMTg4IDE2MFY2N0gxODRDMTg0IDY5LjI1IDE4Mi4yNSA2NyAxODAgNjdIMTA0Wk0xMjAgNjBDMTIwIDY2LjI1IDEyMS43NyA3MCAxMjggNzBIMTYwQzE2Ni4yMyA3MCAxNjggNjYuMjUgMTY4IDYwVjQ4SDEyMFY2MFpNNCA0OFY2MEM0IDY2LjI1IDUuNzcgNzAgMTIgNzBIMTQ0QzE1MC4yMyA3MCAxNTIgNjYuMjUgMTUyIDYwVjQ4SDRaIiBmaWxsPSJ3aGl0ZSIvPgo8L3N2Zz4K","sizes":"192x192","type":"image/svg+xml"}]}">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        /* ====== VARIÁVEIS CSS ====== */
        :root {
            --verde: #28a745;
            --verde-escuro: #20c997;
            --vermelho: #e74c3c;
            --amarelo: #f1c40f;
            --branco: #ffffff;
            --cinza-claro: #f8f9fa;
            --cinza-medio: #dfe6e9;
            --cinza-escuro: #636e72;
            --preto: #2d3436;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        html, body { height: 100%; overflow: hidden; }

        /* ====== GPS FULLSCREEN ====== */
        .gps-fullscreen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100vh;
            background: linear-gradient(135deg, var(--vermelho), #c0392b);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 2rem;
            z-index: 10000;
            animation: gpsPulse 2s infinite;
        }

        @keyframes gpsPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.01); } }

        .gps-emoji { font-size: clamp(80px, 25vw, 140px); margin-bottom: 1.5rem; animation: bounce 1.5s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .gps-titulo { font-size: clamp(1.6rem, 6vw, 2.5rem); font-weight: 900; color: white; text-shadow: 0 3px 10px rgba(0,0,0,0.3); }
        .gps-sub { font-size: clamp(1rem, 4vw, 1.2rem); color: rgba(255,255,255,0.9); margin: 1.5rem 0; max-width: 90%; line-height: 1.5; }
        
        .gps-btn {
            width: 85%; max-width: 350px; padding: 1.5rem 2rem; border: none; border-radius: 50px;
            background: white; color: var(--vermelho);
            font-size: clamp(1.1rem, 4.5vw, 1.4rem); font-weight: 800;
            cursor: pointer; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .gps-btn:hover { transform: translateY(-5px); }
        .gps-btn:active { transform: scale(0.96); }

        /* ====== LAYOUT PRINCIPAL ====== */
        .app-container {
            display: none; height: 100vh;
            flex-direction: column;
            background: var(--cinza-claro);
        }
        .app-container.show { display: flex; }

        /* ====== HEADER ====== */
        .header {
            background: linear-gradient(135deg, var(--verde), var(--verde-escuro));
            padding: 1rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            color: white; box-shadow: 0 4px 20px rgba(40,167,69,0.3);
            z-index: 100;
        }

        .header-title { font-size: 1.3rem; font-weight: 700; }
        
        .header-actions { display: flex; gap: 0.8rem; }
        
        .header-btn {
            background: rgba(255,255,255,0.2); border: none;
            padding: 0.6rem 1rem; border-radius: 20px;
            color: white; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .header-btn:hover { background: rgba(255,255,255,0.3); }
        .header-btn.active { background: white; color: var(--verde); }

        /* ====== CONTEÚDO PRINCIPAL ====== */
        .main-content {
            flex: 1; display: flex;
            position: relative; overflow: hidden;
        }

        /* ====== MAPA ====== */
        #map { flex: 1; height: 100%; width: 100%; }

        /* ====== PAINEL LISTA (Mobile) ====== */
        .list-panel {
            position: fixed; bottom: 0; left: 0;
            width: 100%; height: 65vh;
            background: white;
            border-radius: 25px 25px 0 0;
            transform: translateY(100%);
            transition: transform 0.4s ease;
            z-index: 500; overflow-y: auto;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
        }
        .list-panel.show { transform: translateY(0); }

        .list-header {
            padding: 1.5rem; border-bottom: 1px solid var(--cinza-medio);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: white;
        }
        
        .handle {
            width: 50px; height: 5px; background: var(--cinza-medio);
            border-radius: 3px; position: absolute;
            top: 10px; left: 50%; transform: translateX(-50%);
        }

        .list-title { font-size: 1.4rem; font-weight: 700; color: var(--preto); }
        
        .btn-fechar {
            background: var(--cinza-medio); border: none;
            width: 36px; height: 36px; border-radius: 50%;
            font-size: 1.2rem; color: var(--cinza-escuro);
            cursor: pointer;
        }

        /* ====== CONTADOR ====== */
        .counter-banner {
            background: linear-gradient(135deg, var(--amarelo), #f39c12);
            color: white; padding: 1.2rem; margin: 1rem 1.5rem;
            border-radius: 15px; text-align: center;
            font-weight: 700; font-size: 1.2rem;
            box-shadow: 0 8px 25px rgba(243,156,18,0.3);
        }

        /* ====== ITENS DA LISTA ====== */
        .foco-item {
            padding: 1rem 1.5rem; border-bottom: 1px solid var(--cinza-medio);
            cursor: pointer; transition: background 0.2s;
            display: flex; gap: 1rem;
        }
        .foco-item:hover { background: var(--cinza-claro); }
        .foco-item:last-child { border-bottom: none; }

        .foco-foto { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
        .foco-info { flex: 1; min-width: 0; }
        .foco-desc { font-weight: 600; color: var(--preto); margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .foco-data { font-size: 0.85rem; color: var(--cinza-escuro); }
        .foco-coords { font-size: 0.8rem; color: #999; margin-top: 0.3rem; }

        /* ====== FAB ====== */
        .fab {
            position: fixed; bottom: 25px; right: 25px;
            width: 65px; height: 65px;
            background: linear-gradient(135deg, var(--amarelo), #e67e22);
            border: none; border-radius: 50%;
            color: white; font-size: 2rem;
            box-shadow: 0 8px 30px rgba(230,126,34,0.5);
            cursor: pointer; z-index: 400;
            transition: transform 0.3s;
            animation: floatFab 3s ease-in-out infinite;
        }
        @keyframes floatFab { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .fab:active { transform: scale(0.9); }

        /* ====== MODAL ====== */
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 600;
            justify-content: center; align-items: center;
            padding: 1.5rem;
        }
        .modal.show { display: flex; }

        .modal-content {
            background: white; width: 100%; max-width: 450px;
            border-radius: 25px; padding: 2rem;
            max-height: 90vh; overflow-y: auto;
            position: relative;
        }

        .modal-title { font-size: 1.5rem; font-weight: 700; color: var(--preto); margin-bottom: 1.5rem; }
        
        .modal-close {
            position: absolute; right: 1.5rem; top: 1.5rem;
            background: none; border: none;
            font-size: 2rem; color: var(--cinza-medio);
            cursor: pointer;
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.6rem; font-weight: 600; color: var(--preto); }
        
        .form-input {
            width: 100%; padding: 1rem; border: 2px solid var(--cinza-medio);
            border-radius: 12px; font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-input:focus { outline: none; border-color: var(--verde); }
        
        .form-textarea {
            width: 100%; padding: 1rem; border: 2px solid var(--cinza-medio);
            border-radius: 12px; font-size: 1rem; min-height: 100px;
            resize: vertical; transition: border-color 0.3s;
        }
        .form-textarea:focus { outline: none; border-color: var(--verde); }

        #fotoPreview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 12px; margin-top: 0.8rem; display: none; }

        .btn-registrar {
            width: 100%; padding: 1.2rem; border: none;
            background: linear-gradient(135deg, var(--verde), var(--verde-escuro));
            color: white; border-radius: 12px;
            font-size: 1.1rem; font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .btn-registrar:hover { transform: translateY(-3px); }

        /* ====== TELA TODOS REGISTROS (PC) ====== */
        .full-list-view {
            display: none; flex: 1; height: 100%; overflow-y: auto; padding: 1.5rem;
            background: var(--cinza-claro);
        }
        .full-list-view.show { display: flex; flex-direction: column; }

        .full-list-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem;
        }

        .full-list-title { font-size: 1.6rem; font-weight: 700; color: var(--preto); }

        .voltar-btn {
            background: var(--verde); color: white; border: none;
            padding: 0.8rem 1.5rem; border-radius: 10px;
            font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 0.5rem;
        }

        .full-list-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .foco-card {
            background: white; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer;
            transition: transform 0.3s;
        }
        .foco-card:hover { transform: translateY(-5px); }

        .foco-card-foto { width: 100%; height: 150px; object-fit: cover; }
        .foco-card-info { padding: 1rem; }
        .foco-card-desc { font-weight: 600; margin-bottom: 0.5rem; }
        .foco-card-data { font-size: 0.85rem; color: var(--cinza-escuro); }
        .foco-card-coords { font-size: 0.8rem; color: #999; margin-top: 0.5rem; }

        /* ====== PC (DESKTOP) ====== */
        @media (min-width: 992px) {
            .app-container { flex-direction: row; }
            
            .header { width: 280px; height: 100%;
                flex-direction: column; justify-content: flex-start;            align-items: stretch; padding: 0;
            }
            
            .header { width: 280px; height: 100%; flex-direction: column; justify-content: flex-start; padding: 1.5rem; order: 1; }
            .header-title { font-size: 1.5rem; margin-bottom: 2rem; }
            .header-actions { flex-direction: column; width: 100%; gap: 0.8rem; }
            .header-btn { width: 100%; justify-content: center; padding: 1rem; }
            
            .main-content { flex: 1; flex-direction: row; order: 2; }
            #map { width: 60%; height: 100%; border-radius: 0; }
            
            .list-panel { 
                position: relative; width: 40%; height: 100%; 
                transform: none; border-radius: 0; 
            }
            
            .fab { width: 70px; height: 70px; font-size: 2.2rem; bottom: 30px; right: 30px; }
            
            .full-list-view.show { display: none; }
        }

        /* ====== EMPTY STATE ====== */
        .empty-state {
            text-align: center; padding: 3rem 2rem; color: var(--cinza-escuro);
        }
        .empty-icon { font-size: 4rem; margin-bottom: 1rem; }
        .empty-text { font-size: 1.1rem; }
        .empty-sub { font-size: 0.9rem; margin-top: 0.5rem; color: #999; }
    </style>
</head>
<body>
    <!-- GPS FULLSCREEN -->
    <div class="gps-fullscreen" id="gpsScreen">
        <div class="gps-emoji">📍</div>
        <div class="gps-titulo">ATIVAR LOCALIZAÇÃO</div>
        <div class="gps-sub">Precisamos da sua localização para registrar os focos de dengue no mapa.<br><strong>É gratuito e seguro!</strong></div>
        <button class="gps-btn" id="gpsBtn">🔓 ATIVAR GPS</button>
    </div>

    <!-- APP PRINCIPAL -->
    <div class="app-container" id="app">
        <!-- HEADER -->
        <header class="header">
            <div class="header-title">🦟 Dengue Zero</div>
            <div class="header-actions">
                <button class="header-btn active" id="btnMapa" onclick="showMapa()">
                    🗺️ Mapa
                </button>
                <button class="header-btn" id="btnLista" onclick="showLista()">
                    📋 Lista (<span id="totalCount">0</span>)
                </button>
                <button class="header-btn" onclick="abrirRegistrar()">
                    ➕ Novo Foco
                </button>
            </div>
        </header>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="main-content">
            <!-- MAPA -->
            <div id="map"></div>

            <!-- PAINEL LISTA (Mobile) -->
            <div class="list-panel" id="listPanel">
                <div class="list-header">
                    <div class="handle"></div>
                    <h2 class="list-title">📋 Registros</h2>
                    <button class="btn-fechar" onclick="fecharLista()">✕</button>
                </div>
                <div class="counter-banner">
                    🎯 Total: <span id="totalMobile">0</span> focos
                </div>
                <div id="listaFocos"></div>
            </div>

            <!-- TELA TODOS REGISTROS (PC) -->
            <div class="full-list-view" id="fullListView">
                <div class="full-list-header">
                    <h2 class="full-list-title">📋 Todos os Registros</h2>
                    <button class="voltar-btn" onclick="showMapa()">← Voltar ao Mapa</button>
                </div>
                <div class="full-list-grid" id="gridFocos"></div>
            </div>
        </div>

        <!-- FAB -->
        <button class="fab" id="fabBtn" onclick="abrirRegistrar()">➕</button>

        <!-- MODAL REGISTRO -->
        <div class="modal" id="modalRegistro">
            <div class="modal-content">
                <button class="modal-close" onclick="fecharModal()">×</button>
                <h2 class="modal-title">📸 Novo Foco de Dengue</h2>
                
                <div class="form-group">
                    <label class="form-label">📍 Localização Atual</label>
                    <div id="locInfo" style="padding: 0.8rem; background: #e8f5e9; border-radius: 8px; color: #2e7d32; font-weight: 500;">
                        Detectando...
                    </div>
                </div>
                
                <form id="formRegistro">
                    <div class="form-group">
                        <label class="form-label">📷 Foto do Foco *</label>
                        <input type="file" id="fotoInput" accept="image/*" required class="form-input">
                        <img id="fotoPreview" alt="Preview">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">📝 Descrição *</label>
                        <textarea id="descInput" placeholder="O que você encontrou?&#10;Ex: Pneus com água, vaso de planta, caixa d'água..." class="form-textarea" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn-registrar">✅ REGISTRAR FOCO</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ====== VARIÁVEIS ======
        let map, currentLocation = null;
        let focos = JSON.parse(localStorage.getItem('dengueFocos')) || [];
        let viewAtual = 'mapa';

        // ====== INICIALIZAÇÃO ======
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('gpsBtn').addEventListener('click', ativarGPS);
            document.getElementById('fotoInput').addEventListener('change', previewFoto);
            document.getElementById('formRegistro').addEventListener('submit', registrarFoco);
        });

        // ====== ATIVAR GPS ======
        async function ativarGPS() {
            const gpsBtn = document.getElementById('gpsBtn');
            const gpsScreen = document.getElementById('gpsScreen');
            const app = document.getElementById('app');
            
            gpsBtn.textContent = '⏳ CONECTANDO...';
            gpsBtn.disabled = true;

            if (!navigator.geolocation) {
                alert('❌ GPS não suportado! Use Chrome ou Safari.');
                gpsBtn.disabled = false;
                return;
            }

            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 30000
                    });
                });

                currentLocation = [position.coords.latitude, position.coords.longitude];
                
                gpsScreen.style.display = 'none';
                app.classList.add('show');
                
                initMap();
                atualizarUI();
                carregarMarcadores();

                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

            } catch (error) {
                gpsBtn.textContent = '🔄 TENTAR NOVAMENTE';
                gpsBtn.disabled = false;
                
                let msg = '❌ Erro ao ativar GPS:\n\n';
                if (error.code === 1) msg += '• Permissão negada\n• Clique em "Permitir" no popup\n';
                else if (error.code === 2) msg += '• GPS desligado\n• Ligue nas configurações';
                else msg += '• Tempo esgotado\n• Tente novamente';
                alert(msg);
            }
        }

        // ====== MAPA ======
        function initMap() {
            map = L.map('map').setView(currentLocation, 16);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // Marcador usuário
            const userIcon = L.divIcon({
                html: '<div style="background:#27ae60;color:white;padding:6px 12px;border-radius:15px;font-weight:bold;font-size:12px;white-space:nowrap">🟢 Você</div>',
                iconSize: [80, 30],
                iconAnchor: [40, 30]
            });
            
            L.marker(currentLocation, {icon: userIcon}).addTo(map)
                .bindPopup('<b>✅ Sua posição!</b><br>Clique em + para registrar')
                .openPopup();
        }

        // ====== UI ======
        function atualizarUI() {
            document.getElementById('totalCount').textContent = focos.length;
            document.getElementById('totalMobile').textContent = focos.length;
            renderizarLista();
            renderizarGrid();
        }

        // ====== RENDERIZAR LISTA ======
        function renderizarLista() {
            const lista = document.getElementById('listaFocos');
            
            if (focos.length === 0) {
                lista.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🦟</div>
                        <div class="empty-text">Nenhum foco registrado</div>
                        <div class="empty-sub">Clique em + para registrar</div>
                    </div>
                `;
                return;
            }

            lista.innerHTML = focos.map((foco, index) => `
                <div class="foco-item" onclick="irParaFoco(${foco.lat}, ${foco.lng})">
                    <img src="${foco.foto}" class="foco-foto" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjQiIGhlaWdodD0iNjQiIHZpZXdCb3g9IjAgMCA2NCA2NCIgZmlsbD0ibm9uZSI+PHJlY3QgY3g9IjMyIiBjeT0iMzIiIHI9IjMyIiBmaWxsPSIjZGREREUiLz48dGV4dCB4PSIzMiIgeT0iMzYiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiM5OTk5OTkiPkNhcnJlZ288L3RleHQ+PC9zdmc+'">
                    <div class="foco-info">
                        <div class="foco-desc">${foco.descricao.substring(0, 35)}${foco.descricao.length > 35 ? '...' : ''}</div>
                        <div class="foco-data">${foco.data}</div>
                        <div class="foco-coords">${foco.lat.toFixed(4)}, ${foco.lng.toFixed(4)}</div>
                    </div>
                </div>
            `).join('');
        }

        // ====== RENDERIZAR GRID (PC) ======
        function renderizarGrid() {
            const grid = document.getElementById('gridFocos');
            
            if (focos.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🦟</div>
                        <div class="empty-text">Nenhum foco registrado</div>
                    </div>
                `;
                return;
            }

            grid.innerHTML = focos.map(foco => `
                <div class="foco-card" onclick="irParaFoco(${foco.lat}, ${foco.lng})">
                    <img src="${foco.foto}" class="foco-card-foto" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgdmlld0JveD0iMCAwIDIwMCAyMDAiIGZpbGw9Im5vbmUiPjxyZWN0IHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIiBmaWxsPSIjZGREREUiLz48dGV4dCB4PSIxMDAiIHk9IjEwMCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iIzk5OTk5OSIgZm9udC1zaXplPSIyMCI+Q2FycmVnbzwvdGV4dD48L3N2Zz4='">
                    <div class="foco-card-info">
                        <div class="foco-card-desc">${foco.descricao}</div>
                        <div class="foco-card-data">${foco.data}</div>
                        <div class="foco-card-coords">📍 ${foco.lat.toFixed(5)}, ${foco.lng.toFixed(5)}</div>
                    </div>
                </div>
            `).join('');
        }

        // ====== CARREGAR MARCADORES ======
        function carregarMarcadores() {
            focos.forEach(foco => {
                const icon = L.divIcon({
                    html: '<div style="font-size:28px">🦟</div>',
                    iconSize: [30, 30]
                });
                
                L.marker([foco.lat, foco.lng], {icon: icon}).addTo(map)
                    .bindPopup(`
                        <div style="min-width:200px">
                            <img src="${foco.foto}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px">
                            <div style="font-weight:600">${foco.descricao}</div>
                            <div style="color:#666;font-size:12px">${foco.data}</div>
                        </div>
                    `);
            });
        }

        // ====== NAVEGAÇÃO ======
        function showMapa() {
            viewAtual = 'mapa';
            document.getElementById('btnMapa').classList.add('active');
            document.getElementById('btnLista').classList.remove('active');
            document.getElementById('listPanel').classList.remove('show');
            document.getElementById('fullListView').classList.remove('show');
        }

        function showLista() {
            viewAtual = 'lista';
            document.getElementById('btnMapa').classList.remove('active');
            document.getElementById('btnLista').classList.add('active');
            
            if (window.innerWidth < 992) {
                document.getElementById('listPanel').classList.add('show');
            } else {
                document.getElementById('fullListView').classList.add('show');
            }
        }

        function fecharLista() {
            document.getElementById('listPanel').classList.remove('show');
        }

        function irParaFoco(lat, lng) {
            if (map) {
                map.setView([lat, lng], 18);
                showMapa();
            }
        }

        // ====== MODAL ======
        function abrirRegistrar() {
            if (!currentLocation) {
                alert('🔴 Ative o GPS primeiro!');
                return;
            }
            document.getElementById('modalRegistro').classList.add('show');
            document.getElementById('locInfo').innerHTML = `📍 ${currentLocation[0].toFixed(5)}, ${currentLocation[1].toFixed(5)}`;
            document.getElementById('fotoInput').value = '';
            document.getElementById('fotoPreview').style.display = 'none';
            document.getElementById('descInput').value = '';
        }

        function fecharModal() {
            document.getElementById('modalRegistro').classList.remove('show');
        }

        function previewFoto(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    document.getElementById('fotoPreview').src = ev.target.result;
                    document.getElementById('fotoPreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        // ====== REGISTRAR ======
        async function registrarFoco(e) {
            e.preventDefault();
            
            const fotoFile = document.getElementById('fotoInput').files[0];
            const descricao = document.getElementById('descInput').value.trim();
            const btn = document.querySelector('.btn-registrar');
            
            if (!fotoFile || !descricao) {
                alert('📷 Preencha foto e descrição!');
                return;
            }

            btn.textContent = '⏳ REGISTRANDO...';
            btn.disabled = true;

            try {
                const fotoBase64 = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(fotoFile);
                });

                const novoFoco = {
                    id: Date.now(),
                    lat: currentLocation[0],
                    lng: currentLocation[1],
                    foto: fotoBase64,
                    descricao: descricao.substring(0, 250),
                    data: new Date().toLocaleString('pt-BR', {timeZone: 'America/Sao_Paulo'})
                };

                focos.unshift(novoFoco);
                localStorage.setItem('dengueFocos', JSON.stringify(focos));

                // Marcador
                const icon = L.divIcon({
                    html: '<div style="font-size:28px">🦟</div>',
                    iconSize: [30, 30]
                });
                L.marker([novoFoco.lat, novoFoco.lng], {icon: icon}).addTo(map);

                atualizarUI();
                fecharModal();
                btn.textContent = '✅ REGISTRADO!';
                
                                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

                setTimeout(() => {
                    btn.textContent = '✅ REGISTRAR FOCO';
                    btn.disabled = false;
                }, 2000);

            } catch (erro) {
                console.error(erro);
                alert('❌ Erro ao registrar!');
                btn.textContent = '✅ REGISTRAR FOCO';
                btn.disabled = false;
            }
        }

        // ====== DEBUG ======
        window.debug = {
            limpar: function() {
                if (confirm('🗑️ Limpar todos os registros?')) {
                    localStorage.removeItem('dengueFocos');
                    location.reload();
                }
            },
            ver: function() {
                alert('Total: ' + focos.length + ' focos\nGPS: ' + currentLocation);
            }
        };
    </script>
</body>
</html>

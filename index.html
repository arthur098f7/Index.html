
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f5f7f5;}
#app{display:flex;flex-direction:column;height:100vh;min-height:620px;}
#topbar{background:#fff;border-bottom:1px solid #e0e8e4;padding:0 16px;display:flex;align-items:center;gap:8px;height:50px;z-index:1000;position:relative;flex-wrap:wrap;}
#topbar-logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:#0F6E56;}
.dot{width:10px;height:10px;border-radius:50%;background:#1D9E75;}
.vtab{background:none;border:1px solid #d0ddd8;padding:5px 13px;border-radius:8px;font-size:12px;cursor:pointer;color:#666;transition:all .15s;}
.vtab.active{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:600;}
#loc-btn{margin-left:auto;background:#f0faf5;color:#0F6E56;border:1px solid #9FE1CB;border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:500;}
#loc-btn:hover{background:#1D9E75;color:#fff;border-color:#1D9E75;}
#main{flex:1;display:flex;overflow:hidden;}
#sidebar{width:275px;background:#fff;border-right:1px solid #e0e8e4;display:flex;flex-direction:column;overflow:hidden;}
#stats-row{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid #e0e8e4;}
.sc{flex:1;background:#f5f7f5;border-radius:8px;padding:7px 10px;}
.sl{font-size:10px;color:#888;}
.sv{font-size:18px;font-weight:700;color:#222;}
.sv.red{color:#D85A30;}.sv.green{color:#1D9E75;}
#focos-list{flex:1;overflow-y:auto;padding:8px;}
.fc{background:#fff;border:1px solid #e8eee8;border-radius:10px;padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:border-color .15s;}
.fc:hover{border-color:#1D9E75;}
.fc.sel{border-color:#1D9E75;border-width:2px;}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;}
.ba{background:#FAECE7;color:#993C1D;}
.bm{background:#FAEEDA;color:#854F0B;}
.bb{background:#EAF3DE;color:#3B6D11;}
#map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}
#upload-btn{position:absolute;bottom:20px;right:20px;z-index:600;background:#1D9E75;color:#fff;border:none;border-radius:14px;padding:14px 22px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 18px rgba(0,0,0,.2);}
#upload-btn:hover{background:#0F6E56;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:2000;}
#overlay.open{display:flex;}
#modal{background:#fff;border-radius:18px;padding:22px;width:350px;max-height:92vh;overflow-y:auto;}
#modal h3{font-size:15px;font-weight:700;color:#0F6E56;margin-bottom:2px;}
#modal .sub{font-size:12px;color:#888;margin-bottom:14px;}

/* GPS status bar */
#gps-bar{background:#f0faf5;border:1px solid #9FE1CB;border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px;color:#0F6E56;}
#gps-bar.loading{background:#FAEEDA;border-color:#FAC775;color:#854F0B;}
#gps-bar.error{background:#FAECE7;border-color:#F5C4B3;color:#993C1D;}
#gps-dot{width:9px;height:9px;border-radius:50%;background:#1D9E75;flex-shrink:0;}
#gps-bar.loading #gps-dot{background:#EF9F27;animation:pulse .8s infinite;}
#gps-bar.error #gps-dot{background:#D85A30;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#gps-coords{font-size:10px;color:#3B6D11;margin-top:1px;}
#gps-bar.loading #gps-coords{color:#854F0B;}

#photo-drop{border:2px dashed #b0d8bc;border-radius:10px;padding:16px;text-align:center;cursor:pointer;margin-bottom:12px;transition:border-color .15s;}
#photo-drop:hover,#photo-drop.has{border-color:#1D9E75;background:#f0faf5;}
#prev{width:100%;height:85px;object-fit:cover;border-radius:8px;margin-bottom:6px;display:none;}
.fl{font-size:11px;color:#666;display:block;margin-bottom:3px;font-weight:500;}
select,textarea,input[type=text]{width:100%;border:1px solid #dde8e4;border-radius:7px;padding:7px 10px;font-size:12px;font-family:sans-serif;margin-bottom:10px;outline:none;color:#333;}
select:focus,textarea:focus,input[type=text]:focus{border-color:#1D9E75;}
textarea{height:52px;resize:none;}
.mact{display:flex;gap:8px;justify-content:flex-end;}
.bcn{background:none;border:1px solid #ccc;border-radius:7px;padding:8px 14px;font-size:12px;cursor:pointer;color:#666;}
.bsb{background:#1D9E75;color:#fff;border:none;border-radius:7px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;}
.bsb:hover{background:#0F6E56;}
.bsb:disabled{background:#b0d8bc;cursor:not-allowed;}

#page-lista{display:none;flex-direction:column;padding:14px;gap:8px;overflow-y:auto;flex:1;}
#page-lista.active{display:flex;}
.lc{background:#fff;border:1px solid #e8eee8;border-radius:10px;padding:12px 14px;display:flex;gap:10px;}
.lno-img{width:58px;height:58px;border-radius:8px;background:#f0f4f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;}
.lc img{width:58px;height:58px;border-radius:8px;object-fit:cover;flex-shrink:0;}

#page-stats{display:none;flex-direction:column;padding:14px;gap:8px;overflow-y:auto;flex:1;}
#page-stats.active{display:flex;}
.sh{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.br{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.bl{font-size:11px;color:#555;width:130px;flex-shrink:0;}
.bt{flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden;}
.bf{height:100%;border-radius:4px;transition:width .6s;}
.bc{font-size:11px;font-weight:700;min-width:18px;text-align:right;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0F6E56;color:#fff;border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;z-index:4000;display:none;box-shadow:0 4px 18px rgba(0,0,0,.22);white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="topbar-logo"><div class="dot"></div>Dengue Zero</div>
    <button class="vtab active" onclick="switchView('mapa')">🗺 Mapa</button>
    <button class="vtab" onclick="switchView('lista')">📋 Lista</button>
    <button class="vtab" onclick="switchView('stats')">📊 Dados</button>
    <button id="loc-btn" onclick="gotoMyLocation()">📍 Minha localização</button>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="stats-row">
        <div class="sc"><div class="sl">Total</div><div class="sv" id="st">4</div></div>
        <div class="sc"><div class="sl">Alto risco</div><div class="sv red" id="sa">1</div></div>
        <div class="sc"><div class="sl">Resolvidos</div><div class="sv green" id="sr">0</div></div>
      </div>
      <div id="focos-list"></div>
    </div>
    <div id="map-wrap">
      <div id="map"></div>
      <button id="upload-btn" onclick="openModal()">📷 Registrar foco</button>
    </div>
    <div id="page-lista"></div>
    <div id="page-stats">
      <div class="sh">Risco por bairro</div><div id="bb"></div>
      <div class="sh" style="margin-top:10px;">Tipo de foco</div><div id="bt2"></div>
      <div class="sh" style="margin-top:10px;">Status</div><div id="bs2"></div>
    </div>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <h3>📍 Registrar foco de dengue</h3>
    <p class="sub">Sua localização é capturada automaticamente</p>

    <div id="gps-bar" class="loading">
      <div id="gps-dot"></div>
      <div>
        <div id="gps-txt">Obtendo sua localização GPS...</div>
        <div id="gps-coords"></div>
      </div>
    </div>

    <div id="photo-drop" onclick="document.getElementById('fi').click()">
      <img id="prev" src="" alt="preview"/>
      <div style="font-size:26px;">📸</div>
      <p id="ptxt" style="font-size:12px;color:#888;margin-top:4px;">Clique para tirar foto ou escolher da galeria</p>
    </div>
    <input type="file" id="fi" accept="image/*" capture="environment" style="display:none" onchange="onFile(event)"/>

    <label class="fl">Referência do local (opcional)</label>
    <input type="text" id="ia" placeholder="Ex: próximo ao mercado, portão azul..."/>

    <label class="fl">Tipo de foco</label>
    <select id="it">
      <option>Caixa d'água descoberta</option>
      <option>Pneu com água</option>
      <option>Calha entupida</option>
      <option>Vaso com prato</option>
      <option>Lixo acumulado</option>
      <option>Outro</option>
    </select>

    <label class="fl">Nível de risco</label>
    <select id="ir">
      <option value="alto">Alto</option>
      <option value="medio" selected>Médio</option>
      <option value="baixo">Baixo</option>
    </select>

    <label class="fl">Descrição (opcional)</label>
    <textarea id="id2" placeholder="Descreva o foco..."></textarea>

    <div class="mact">
      <button class="bcn" onclick="closeModal()">Cancelar</button>
      <button class="bsb" id="btn-enviar" onclick="submitFoco()" disabled>✓ Enviar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const BARREIRAS = [-12.1511, -44.9914];
const map = L.map('map').setView(BARREIRAS, 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap',maxZoom:19
}).addTo(map);

const focos = [
  {id:1,title:"Caixa d'água descoberta",addr:"Rua 7 de Setembro, 45",bairro:"Centro",tipo:"Caixa d'água descoberta",risco:"alto",desc:"Caixa sem tampa em imóvel abandonado.",status:"Pendente",lat:-12.1480,lng:-44.9930,img:null},
  {id:2,title:"Pneu com água parada",addr:"Av. Brasil, 210",bairro:"Jardim América",tipo:"Pneu com água",risco:"medio",desc:"Vários pneus em terreno baldio.",status:"Pendente",lat:-12.1540,lng:-44.9870,img:null},
  {id:3,title:"Calha entupida",addr:"Rua das Acácias, 78",bairro:"Nova Barreiras",tipo:"Calha entupida",risco:"baixo",desc:"Calha acumulando água da chuva.",status:"Pendente",lat:-12.1560,lng:-44.9950,img:null},
  {id:4,title:"Lixo e poças",addr:"Rua Goiás, 512",bairro:"Centro",tipo:"Lixo acumulado",risco:"medio",desc:"Descarte irregular com poças d'água.",status:"Pendente",lat:-12.1490,lng:-44.9860,img:null}
];

let selId=null, photoData=null, userMarker=null;
let capturedLat=null, capturedLng=null, capturedAddr='';
const markers={};
const pinColors={alto:"#D85A30",medio:"#EF9F27",baixo:"#1D9E75"};

function makeIcon(risco,sel){
  const c=pinColors[risco], s=sel?32:24;
  return L.divIcon({className:'',html:`<div style="width:${s}px;height:${s}px;border-radius:50%;background:${c};border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:${sel?12:9}px;font-weight:700;color:#fff;"></div>`,iconSize:[s,s],iconAnchor:[s/2,s/2]});
}

function addMarker(f){
  const m=L.marker([f.lat,f.lng],{icon:makeIcon(f.risco,false)}).addTo(map);
  m.on('click',()=>selectFoco(f.id));
  markers[f.id]=m;
}
focos.forEach(addMarker);

function renderSidebar(){
  document.getElementById('focos-list').innerHTML=focos.map(f=>`
    <div class="fc${selId===f.id?' sel':''}" onclick="selectFoco(${f.id})">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
        <span class="badge ${f.risco==='alto'?'ba':f.risco==='medio'?'bm':'bb'}">${f.risco==='alto'?'Alto':f.risco==='medio'?'Médio':'Baixo'} risco</span>
        ${f.img?`<img src="${f.img}" style="width:34px;height:34px;border-radius:6px;object-fit:cover;margin-left:auto;"/>` : ''}
      </div>
      <div style="font-size:12px;font-weight:600;color:#222;margin-bottom:2px;">${f.title}</div>
      <div style="font-size:11px;color:#888;margin-bottom:2px;">📍 ${f.addr}</div>
      <div style="font-size:10px;color:#aaa;">${f.tipo}</div>
    </div>`).join('');
  document.getElementById('st').textContent=focos.length;
  document.getElementById('sa').textContent=focos.filter(f=>f.risco==='alto').length;
  document.getElementById('sr').textContent=focos.filter(f=>f.status==='Resolvido').length;
}

function selectFoco(id){
  selId=id;
  const f=focos.find(x=>x.id===id);
  Object.keys(markers).forEach(k=>markers[k].setIcon(makeIcon(focos.find(x=>x.id==k).risco,false)));
  markers[id].setIcon(makeIcon(f.risco,true));
  map.flyTo([f.lat,f.lng],17,{duration:1.2});
  markers[id].bindPopup(`<div style="min-width:170px;font-family:sans-serif;">
    ${f.img?`<img src="${f.img}" style="width:100%;height:72px;object-fit:cover;border-radius:6px;margin-bottom:6px;"/>`:''}
    <div style="font-size:12px;font-weight:700;margin-bottom:2px;">${f.title}</div>
    <div style="font-size:11px;color:#888;margin-bottom:3px;">📍 ${f.addr}</div>
    <div style="font-size:11px;color:#555;margin-bottom:5px;">${f.desc}</div>
    <span style="font-size:10px;padding:2px 8px;border-radius:99px;background:${f.risco==='alto'?'#FAECE7':f.risco==='medio'?'#FAEEDA':'#EAF3DE'};color:${f.risco==='alto'?'#993C1D':f.risco==='medio'?'#854F0B':'#3B6D11'};font-weight:600;">${f.risco==='alto'?'Alto':f.risco==='medio'?'Médio':'Baixo'} risco</span>
  </div>`).openPopup();
  renderSidebar();
}

function gotoMyLocation(){
  if(!navigator.geolocation){showToast('⚠️ Geolocalização não disponível');return;}
  const btn=document.getElementById('loc-btn');
  btn.textContent='⏳ Localizando...';
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    map.flyTo([lat,lng],16,{duration:1.5});
    if(userMarker) userMarker.remove();
    userMarker=L.marker([lat,lng],{icon:L.divIcon({className:'',html:`<div style="width:18px;height:18px;border-radius:50%;background:#2563eb;border:3px solid #fff;box-shadow:0 0 0 7px rgba(37,99,235,.2);"></div>`,iconSize:[18,18],iconAnchor:[9,9]})}).addTo(map);
    userMarker.bindPopup('<b style="font-size:12px;">📍 Você está aqui</b>').openPopup();
    btn.textContent='📍 Minha localização';
    showToast('📍 Localização ativada!');
  },()=>{btn.textContent='📍 Minha localização';showToast('❌ Permissão de localização negada');},{enableHighAccuracy:true,timeout:10000});
}

function openModal(){
  photoData=null; capturedLat=null; capturedLng=null; capturedAddr='';
  document.getElementById('prev').style.display='none';
  document.getElementById('photo-drop').className='';
  document.getElementById('ptxt').textContent='Clique para tirar foto ou escolher da galeria';
  document.getElementById('ia').value='';
  document.getElementById('id2').value='';
  document.getElementById('btn-enviar').disabled=true;
  setGpsBar('loading','Obtendo sua localização GPS...','');
  document.getElementById('overlay').classList.add('open');

  if(!navigator.geolocation){
    setGpsBar('error','GPS não disponível neste dispositivo','');
    document.getElementById('btn-enviar').disabled=false;
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    capturedLat=pos.coords.latitude;
    capturedLng=pos.coords.longitude;
    const acc=Math.round(pos.coords.accuracy);

    setGpsBar('ok',`📍 Localização capturada (precisão: ±${acc}m)`,`${capturedLat.toFixed(5)}, ${capturedLng.toFixed(5)}`);
    document.getElementById('btn-enviar').disabled=false;

    // Reverse geocoding via Nominatim (em segundo plano)
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${capturedLat}&lon=${capturedLng}&format=json&accept-language=pt`)
      .then(r=>r.json())
      .then(d=>{
        const road=d.address.road||d.address.pedestrian||d.address.street||'';
        const house=d.address.house_number||'';
        const suburb=d.address.suburb||d.address.neighbourhood||d.address.quarter||'';
        const city=d.address.city||d.address.town||'Barreiras';
        capturedAddr=`${road}${house?' '+house:''}, ${suburb||city}`;
        setGpsBar('ok',`📍 Localização capturada (precisão: ±${acc}m)`,capturedAddr);
              })
      .catch(()=>{
        capturedAddr=`${capturedLat.toFixed(5)}, ${capturedLng.toFixed(5)}`;
        setGpsBar('ok',`📍 Localização capturada (precisão: ±${acc}m)`,capturedAddr);
              });
  },err=>{
    setGpsBar('error','Não foi possível obter localização','Verifique as permissões do GPS');
    capturedLat=map.getCenter().lat+(Math.random()-.5)*.004;
    capturedLng=map.getCenter().lng+(Math.random()-.5)*.004;
    capturedAddr='Localização aproximada';
    document.getElementById('btn-enviar').disabled=false;
  },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}

function setGpsBar(state,txt,coords){
  const bar=document.getElementById('gps-bar');
  bar.className=''; bar.classList.add(state==='ok'?'':''+state);
  document.getElementById('gps-txt').textContent=txt;
  document.getElementById('gps-coords').textContent=coords;
  if(state==='ok'){bar.style.background='#f0faf5';bar.style.borderColor='#9FE1CB';document.getElementById('gps-dot').style.background='#1D9E75';document.getElementById('gps-dot').style.animation='none';document.getElementById('gps-txt').style.color='#0F6E56';document.getElementById('gps-coords').style.color='#3B6D11';}
  if(state==='loading'){bar.style.background='#FAEEDA';bar.style.borderColor='#FAC775';document.getElementById('gps-dot').style.background='#EF9F27';document.getElementById('gps-dot').style.animation='pulse .8s infinite';document.getElementById('gps-txt').style.color='#854F0B';document.getElementById('gps-coords').style.color='#854F0B';}
  if(state==='error'){bar.style.background='#FAECE7';bar.style.borderColor='#F5C4B3';document.getElementById('gps-dot').style.background='#D85A30';document.getElementById('gps-dot').style.animation='none';document.getElementById('gps-txt').style.color='#993C1D';document.getElementById('gps-coords').style.color='#993C1D';}
}

function closeModal(){document.getElementById('overlay').classList.remove('open');}

function onFile(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    photoData=ev.target.result;
    const pi=document.getElementById('prev');
    pi.src=photoData;pi.style.display='block';
    document.getElementById('photo-drop').classList.add('has');
    document.getElementById('ptxt').textContent='✓ Foto selecionada';
  };
  r.readAsDataURL(f);
}

function submitFoco(){
  const ref=document.getElementById('ia').value;
  const tipo=document.getElementById('it').value;
  const risco=document.getElementById('ir').value;
  const desc=document.getElementById('id2').value||'Sem descrição.';
  const addr=ref?`${ref} (${capturedAddr})`:capturedAddr;
  const bairro=capturedAddr.split(',')[1]?.trim()||'Barreiras';
  const lat=capturedLat;
  const lng=capturedLng;
  const nf={id:focos.length+1,title:tipo,addr,bairro,tipo,risco,desc,status:'Pendente',lat,lng,img:photoData};
  focos.push(nf);
  addMarker(nf);
  closeModal();
  renderSidebar();renderLista();renderStats();
  // Voa para o ponto e abre popup
  setTimeout(()=>{
    map.flyTo([lat,lng],18,{duration:1.3});
    setTimeout(()=>selectFoco(nf.id),1400);
  },200);
  showToast('✅ Foco registrado no mapa!');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

function switchView(v){
  document.querySelectorAll('.vtab').forEach((b,i)=>b.classList.toggle('active',['mapa','lista','stats'][i]===v));
  document.getElementById('sidebar').style.display=v==='mapa'?'flex':'none';
  document.getElementById('map-wrap').style.display=v==='mapa'?'flex':'none';
  document.getElementById('page-lista').classList.toggle('active',v==='lista');
  document.getElementById('page-stats').classList.toggle('active',v==='stats');
  if(v==='lista')renderLista();
  if(v==='stats')renderStats();
  if(v==='mapa')setTimeout(()=>map.invalidateSize(),100);
}

function renderLista(){
  document.getElementById('page-lista').innerHTML=focos.map(f=>`
    <div class="lc">
      ${f.img?`<img src="${f.img}"/>`:`<div class="lno-img">📷</div>`}
      <div style="flex:1;">
           </div>
    <div id="map-wrap">
      <div id="map"></div>
      <button id="upload-btn" onclick="openModal()">📷 Registrar foco</button>
    </div>
    <div id="page-lista"></div>
    <div id="page-stats">
      <div class="sh">Risco por bairro</div><div id="bb"></div>
      <div class="sh" style="margin-top:10px;">Tipo de foco</div><div id="bt2"></div>
      <div class="sh" style="margin-top:10px;">Status</div><div id="bs2"></div>
    </div>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <h3>📍 Registrar foco de dengue</h3>
    <p class="sub">Sua localização é capturada automaticamente</p>

    <div id="gps-bar" class="loading">
      <div id="gps-dot"></div>
      <div>
        <div id="gps-txt">Obtendo sua localização GPS...</div>
        <div id="gps-coords"></div>
      </div>
    </div>

    <div id="photo-drop" onclick="document.getElementById('fi').click()">
      <img id="prev" src="" alt="preview"/>
      <div style="font-size:26px;">📸</div>
      <p id="ptxt" style="font-size:12px;color:#888;margin-top:4px;">Clique para tirar foto ou escolher da galeria</p>
    </div>
    <input type="file" id="fi" accept="image/*" capture="environment" style="display:none" onchange="onFile(event)"/>

    <label class="fl">Referência do local (opcional)</label>
    <input type="text" id="ia" placeholder="Ex: próximo ao mercado, portão azul..."/>

    <label class="fl">Tipo de foco</label>
    <select id="it">
      <option>Caixa d'água descoberta</option>
      <option>Pneu com água</option>
      <option>Calha entupida</option>
      <option>Vaso com prato</option>
      <option>Lixo acumulado</option>
      <option>Outro</option>
    </select>

    <label class="fl">Nível de risco</label>
    <select id="ir">
      <option value="alto">Alto</option>
      <option value="medio" selected>Médio</option>
      <option value="baixo">Baixo</option>
    </select>

    <label class="fl">Descrição (opcional)</label>
    <textarea id="id2" placeholder="Descreva o foco..."></textarea>

    <div class="mact">
      <button class="bcn" onclick="closeModal()">Cancelar</button>
      <button class="bsb" id="btn-enviar" onclick="submitFoco()" disabled>✓ Enviar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const BARREIRAS = [-12.1511, -44.9914];
const map = L.map('map').setView(BARREIRAS, 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap',maxZoom:19
}).addTo(map);

const focos = [
  {id:1,title:"Caixa d'água descoberta",addr:"Rua 7 de Setembro, 45",bairro:"Centro",tipo:"Caixa d'água descoberta",risco:"alto",desc:"Caixa sem tampa em imóvel abandonado.",status:"Pendente",lat:-12.1480,lng:-44.9930,img:null},
  {id:2,title:"Pneu com água parada",addr:"Av. Brasil, 210",bairro:"Jardim América",tipo:"Pneu com água",risco:"medio",desc:"Vários pneus em terreno baldio.",status:"Pendente",lat:-12.1540,lng:-44.9870,img:null},
  {id:3,title:"Calha entupida",addr:"Rua das Acácias, 78",bairro:"Nova Barreiras",tipo:"Calha entupida",risco:"baixo",desc:"Calha acumulando água da chuva.",status:"Pendente",lat:-12.1560,lng:-44.9950,img:null},
  {id:4,title:"Lixo e poças",addr:"Rua Goiás, 512",bairro:"Centro",tipo:"Lixo acumulado",risco:"medio",desc:"Descarte irregular com poças d'água.",status:"Pendente",lat:-12.1490,lng:-44.9860,img:null}
];

let selId=null, photoData=null, userMarker=null;
let capturedLat=null, capturedLng=null, capturedAddr='';
const markers={};
const pinColors={alto:"#D85A30",medio:"#EF9F27",baixo:"#1D9E75"};

function makeIcon(risco,sel){
  const c=pinColors[risco], s=sel?32:24;
  return L.divIcon({className:'',html:`<div style="width:${s}px;height:${s}px;border-radius:50%;background:${c};border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:${sel?12:9}px;font-weight:700;color:#fff;"></div>`,iconSize:[s,s],iconAnchor:[s/2,s/2]});
}

function addMarker(f){
  const m=L.marker([f.lat,f.lng],{icon:makeIcon(f.risco,false)}).addTo(map);
  m.on('click',()=>selectFoco(f.id));
  markers[f.id]=m;
}
focos.forEach(addMarker);

function renderSidebar(){
  document.getElementById('focos-list').innerHTML=focos.map(f=>`
    <div class="fc${selId===f.id?' sel':''}" onclick="selectFoco(${f.id})">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
        <span class="badge ${f.risco==='alto'?'ba':f.risco==='medio'?'bm':'bb'}">${f.risco==='alto'?'Alto':f.risco==='medio'?'Médio':'Baixo'} risco</span>
        ${f.img?`<img src="${f.img}" style="width:34px;height:34px;border-radius:6px;object-fit:cover;margin-left:auto;"/>` : ''}
      </div>
      <div style="font-size:12px;font-weight:600;color:#222;margin-bottom:2px;">${f.title}</div>
      <div style="font-size:11px;color:#888;margin-bottom:2px;">📍 ${f.addr}</div>
      <div style="font-size:10px;color:#aaa;">${f.tipo}</div>
    </div>`).join('');
  document.getElementById('st').textContent=focos.length;
  document.getElementById('sa').textContent=focos.filter(f=>f.risco==='alto').length;
  document.getElementById('sr').textContent=focos.filter(f=>f.status==='Resolvido').length;
}

function selectFoco(id){
  selId=id;
  const f=focos.find(x=>x.id===id);
  Object.keys(markers).forEach(k=>markers[k].setIcon(makeIcon(focos.find(x=>x.id==k).risco,false)));
  markers[id].setIcon(makeIcon(f.risco,true));
  map.flyTo([f.lat,f.lng],17,{duration:1.2});
  markers[id].bindPopup(`<div style="min-width:170px;font-family:sans-serif;">
    ${f.img?`<img src="${f.img}" style="width:100%;height:72px;object-fit:cover;border-radius:6px;margin-bottom:6px;"/>`:''}
    <div style="font-size:12px;font-weight:700;margin-bottom:2px;">${f.title}</div>
    <div style="font-size:11px;color:#888;margin-bottom:3px;">📍 ${f.addr}</div>
    <div style="font-size:11px;color:#555;margin-bottom:5px;">${f.desc}</div>
    <span style="font-size:10px;padding:2px 8px;border-radius:99px;background:${f.risco==='alto'?'#FAECE7':f.risco==='medio'?'#FAEEDA':'#EAF3DE'};color:${f.risco==='alto'?'#993C1D':f.risco==='medio'?'#854F0B':'#3B6D11'};font-weight:600;">${f.risco==='alto'?'Alto':f.risco==='medio'?'Médio':'Baixo'} risco</span>
  </div>`).openPopup();
  renderSidebar();
}

function gotoMyLocation(){
  if(!navigator.geolocation){showToast('⚠️ Geolocalização não disponível');return;}
  const btn=document.getElementById('loc-btn');
  btn.textContent='⏳ Localizando...';
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    map.flyTo([lat,lng],16,{duration:1.5});
    if(userMarker) userMarker.remove();
    userMarker=L.marker([lat,lng],{icon:L.divIcon({className:'',html:`<div style="width:18px;height:18px;border-radius:50%;background:#2563eb;border:3px solid #fff;box-shadow:0 0 0 7px rgba(37,99,235,.2);"></div>`,iconSize:[18,18],iconAnchor:[9,9]})}).addTo(map);
    userMarker.bindPopup('<b style="font-size:12px;">📍 Você está aqui</b>').openPopup();
    btn.textContent='📍 Minha localização';
    showToast('📍 Localização ativada!');
  },()=>{btn.textContent='📍 Minha localização';showToast('❌ Permissão de localização negada');},{enableHighAccuracy:true,timeout:10000});
}

function openModal(){
  photoData=null; capturedLat=null; capturedLng=null; capturedAddr='';
  document.getElementById('prev').style.display='none';
  document.getElementById('photo-drop').className='';
  document.getElementById('ptxt').textContent='Clique para tirar foto ou escolher da galeria';
  document.getElementById('ia').value='';
  document.getElementById('id2').value='';
  document.getElementById('btn-enviar').disabled=true;
  setGpsBar('loading','Obtendo sua localização GPS...','');
  document.getElementById('overlay').classList.add('open');

  if(!navigator.geolocation){
    setGpsBar('error','GPS não disponível neste dispositivo','');
    document.getElementById('btn-enviar').disabled=false;
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    capturedLat=pos.coords.latitude;
    capturedLng=pos.coords.longitude;
    const acc=Math.round(pos.coords.accuracy);

    // Reverse geocoding via Nominatim
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${capturedLat}&lon=${capturedLng}&format=json&accept-language=pt`)
      .then(r=>r.json())
      .then(d=>{
        const road=d.address.road||d.address.pedestrian||d.address.street||'';
        const house=d.address.house_number||'';
        const suburb=d.address.suburb||d.address.neighbourhood||d.address.quarter||'';
        const city=d.address.city||d.address.town||'Barreiras';
        capturedAddr=`${road}${house?' '+house:''}, ${suburb||city}`;
        setGpsBar('ok',`📍 Localização capturada (precisão: ±${acc}m)`,capturedAddr);
        document.getElementById('btn-enviar').disabled=false;
      })
      .catch(()=>{
        capturedAddr=`${capturedLat.toFixed(5)}, ${capturedLng.toFixed(5)}`;
        setGpsBar('ok',`📍 Localização capturada (precisão: ±${acc}m)`,capturedAddr);
        document.getElementById('btn-enviar').disabled=false;
      });
  },err=>{
    setGpsBar('error','Não foi possível obter localização','Verifique as permissões do GPS');
    capturedLat=map.getCenter().lat+(Math.random()-.5)*.004;
    capturedLng=map.getCenter().lng+(Math.random()-.5)*.004;
    capturedAddr='Localização aproximada';
    document.getElementById('btn-enviar').disabled=false;
  },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}

function setGpsBar(state,txt,coords){
  const bar=document.getElementById('gps-bar');
  bar.className=''; bar.classList.add(state==='ok'?'':''+state);
  document.getElementById('gps-txt').textContent=txt;
  document.getElementById('gps-coords').textContent=coords;
  if(state==='ok'){bar.style.background='#f0faf5';bar.style.borderColor='#9FE1CB';document.getElementById('gps-dot').style.background='#1D9E75';document.getElementById('gps-dot').style.animation='none';document.getElementById('gps-txt').style.color='#0F6E56';document.getElementById('gps-coords').style.color='#3B6D11';}
  if(state==='loading'){bar.style.background='#FAEEDA';bar.style.borderColor='#FAC775';document.getElementById('gps-dot').style.background='#EF9F27';document.getElementById('gps-dot').style.animation='pulse .8s infinite';document.getElementById('gps-txt').style.color='#854F0B';document.getElementById('gps-coords').style.color='#854F0B';}
  if(state==='error'){bar.style.background='#FAECE7';bar.style.borderColor='#F5C4B3';document.getElementById('gps-dot').style.background='#D85A30';document.getElementById('gps-dot').style.animation='none';document.getElementById('gps-txt').style.color='#993C1D';document.getElementById('gps-coords').style.color='#993C1D';}
}

function closeModal(){document.getElementById('overlay').classList.remove('open');}

function onFile(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    photoData=ev.target.result;
    const pi=document.getElementById('prev');
    pi.src=photoData;pi.style.display='block';
    document.getElementById('photo-drop').classList.add('has');
    document.getElementById('ptxt').textContent='✓ Foto selecionada';
  };
  r.readAsDataURL(f);
}

function submitFoco(){
  const ref=document.getElementById('ia').value;
  const tipo=document.getElementById('it').value;
  const risco=document.getElementById('ir').value;
  const desc=document.getElementById('id2').value||'Sem descrição.';
  const addr=ref?`${ref} (${capturedAddr})`:capturedAddr;
  const bairro=capturedAddr.split(',')[1]?.trim()||'Barreiras';
  const lat=capturedLat;
  const lng=capturedLng;
  const nf={id:focos.length+1,title:tipo,addr,bairro,tipo,risco,desc,status:'Pendente',lat,lng,img:photoData};
  focos.push(nf);
  addMarker(nf);
  closeModal();
  renderSidebar();renderLista();renderStats();
  // Voa para o ponto e abre popup
  setTimeout(()=>{
    map.flyTo([lat,lng],18,{duration:1.3});
    setTimeout(()=>selectFoco(nf.id),1400);
  },200);
  showToast('✅ Foco registrado no mapa!');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

function switchView(v){
  document.querySelectorAll('.vtab').forEach((b,i)=>b.classList.toggle('active',['mapa','lista','stats'][i]===v));
  document.getElementById('sidebar').style.display=v==='mapa'?'flex':'none';
  document.getElementById('map-wrap').style.display=v==='mapa'?'flex':'none';
  document.getElementById('page-lista').classList.toggle('active',v==='lista');
  document.getElementById('page-stats').classList.toggle('active',v==='stats');
  if(v==='lista')renderLista();
  if(v==='stats')renderStats();
  if(v==='mapa')setTimeout(()=>map.invalidateSize(),100);
}

function renderLista(){
  document.getElementById('page-lista').innerHTML=focos.map(f=>`
    <div class="lc">
      ${f.img?`<img src="${f.img}"/>`:`<div class="lno-img">📷</div>`}
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;margin-bottom:2px;">${f.title}</div>
        <div style="font-size:11px;color:#888;margin-bottom:4px;">📍 ${f.addr}</div>
        <span class="badge ${f.risco==='alto'?'ba':f.risco==='medio'?'bm':'bb'}">${f.risco==='alto'?'Alto':f.risco==='medio'?'Médio':'Baixo'} risco</span>
      </div>
    </div>`).join('');
}

function renderStats(){
  const cnt=(key)=>focos.reduce((a,f)=>{a[f[key]]=(a[f[key]]||0)+1;return a;},{});
  const bars=(obj,color)=>{
    const max=Math.max(...Object.values(obj),1);
    return Object.entries(obj).map(([k,v])=>`<div class="br"><div class="bl">${k}</div><div class="bt"><div class="bf" style="width:${Math.round(v/max*100)}%;background:${color}"></div></div><div class="bc">${v}</div></div>`).join('');
  };
  document.getElementById('bb').innerHTML=bars(cnt('bairro'),'#1D9E75');
  document.getElementById('bt2').innerHTML=bars(cnt('tipo'),'#378ADD');
  document.getElementById('bs2').innerHTML=bars(cnt('status'),'#BA7517');
}

renderSidebar();
</script>
</body>
</html>
